spring.application.name=mailer

mailer.kafka.topic=${MAILER_KAFKA_TOPIC:mailer.send-email.v1}
mailer.kafka.group-id=${MAILER_KAFKA_GROUP_ID:mailer-consumer-group}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.github.objoradddd.mailer.adapters.in.kafka.KafkaMailEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=com.github.objoradddd.mailer.adapters.in.kafka

spring.mail.host=${MAIL_SMTP_HOST:localhost}
spring.mail.port=${MAIL_SMTP_PORT:1025}
spring.mail.username=${MAIL_SMTP_USERNAME:}
spring.mail.password=${MAIL_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

management.endpoints.web.exposure.include=health,info,prometheus
logging.level.root=INFO